<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ninety One — Quality Challenge</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,300&display=swap" rel="stylesheet">
<style>
  :root {
    --lg: #134848; --lg-light: #1a5e5e; --ot: #009D80; --ot-glow: #00c9a3;
    --cc: #FBAA96; --ai: #221B3B; --gg: #74908D; --sc: #E8E5CE;
    --pb: #591739; --wy: #FCAA28; --pr: #D83949; --b02: #424242;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--ai); color: #fff; min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
  .bg-grid { position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: radial-gradient(ellipse 600px 400px at 15% 20%, rgba(0,157,128,0.12), transparent), radial-gradient(ellipse 500px 500px at 85% 75%, rgba(89,23,57,0.1), transparent), radial-gradient(ellipse 300px 300px at 50% 50%, rgba(19,72,72,0.08), transparent); }
  .bg-grid::after { content:''; position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px); background-size: 60px 60px; }
  .screen { display: none; position: relative; z-index: 1; min-height: 100vh; padding: 40px 32px; }
  .screen.active { display: flex; flex-direction: column; animation: fadeUp 0.5s ease; }
  @keyframes fadeUp { from { opacity:0; transform: translateY(24px); } to { opacity:1; transform: translateY(0); } }
  .logo-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; opacity: 0.7; cursor: default; user-select: none; }
  .logo-bar .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--ot); }
  .logo-bar span { font-size: 13px; letter-spacing: 3px; text-transform: uppercase; color: var(--gg); }
  .welcome-hero { flex:1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; gap: 28px; }
  .welcome-hero h1 { font-family: 'Fraunces', serif; font-weight: 500; font-size: 52px; line-height: 1.15; color: #fff; max-width: 680px; }
  .welcome-hero h1 em { font-style: italic; color: var(--ot-glow); }
  .welcome-hero p { font-size: 18px; line-height: 1.6; color: var(--gg); max-width: 520px; }
  .btn-primary { display: inline-flex; align-items: center; gap: 10px; padding: 18px 44px; border: none; border-radius: 60px; background: var(--ot); color: #fff; font-family: 'DM Sans', sans-serif; font-size: 17px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; letter-spacing: 0.3px; }
  .btn-primary:hover { background: var(--ot-glow); transform: scale(1.03); }
  .btn-primary:active { transform: scale(0.97); }
  .btn-ghost { display: inline-flex; align-items: center; gap: 8px; padding: 14px 32px; border: 1.5px solid rgba(255,255,255,0.2); border-radius: 60px; background: transparent; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.3s ease; }
  .btn-ghost:hover { border-color: var(--ot); color: var(--ot); }
  .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
  .progress-track { flex:1; height: 4px; background: rgba(255,255,255,0.08); border-radius: 4px; margin: 0 20px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--ot), var(--ot-glow)); border-radius: 4px; transition: width 0.5s ease; }
  .step-label { font-size: 14px; color: var(--gg); white-space: nowrap; font-weight: 500; }
  .question-card { flex:1; display: flex; flex-direction: column; justify-content: center; max-width: 780px; margin: 0 auto; width: 100%; }
  .q-category { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; text-transform: uppercase; letter-spacing: 2.5px; color: var(--ot); margin-bottom: 16px; font-weight: 600; }
  .q-category .icon { font-size: 18px; }
  .q-text { font-family: 'Fraunces', serif; font-size: 28px; font-weight: 400; line-height: 1.4; color: #fff; margin-bottom: 28px; }
  .options-grid { display: flex; flex-direction: column; gap: 14px; }
  .option-btn { position: relative; display: flex; align-items: center; gap: 16px; padding: 22px 28px; border: 1.5px solid rgba(255,255,255,0.1); border-radius: 16px; background: rgba(255,255,255,0.03); color: #fff; font-family: 'DM Sans', sans-serif; font-size: 16px; text-align: left; cursor: pointer; transition: all 0.3s ease; backdrop-filter: blur(8px); }
  .option-btn:hover { border-color: var(--ot); background: rgba(0,157,128,0.06); }
  .option-btn:active { transform: scale(0.98); }
  .option-btn.correct { border-color: var(--ot-glow); background: rgba(0,157,128,0.18); box-shadow: 0 0 40px rgba(0,201,163,0.15); }
  .option-btn.wrong { border-color: var(--pr); background: rgba(216,57,73,0.12); }
  .opt-letter { width: 36px; height: 36px; border-radius: 10px; background: rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; flex-shrink: 0; transition: all 0.3s ease; }
  .option-btn.correct .opt-letter { background: var(--ot-glow); }
  .option-btn.wrong .opt-letter { background: var(--pr); }
  .feedback-box { margin-top: 24px; padding: 20px 24px; border-radius: 14px; font-size: 15px; line-height: 1.6; animation: fadeUp 0.4s ease; }
  .feedback-box.correct-fb { background: rgba(0,157,128,0.1); border: 1px solid rgba(0,157,128,0.2); color: var(--ot-glow); }
  .feedback-box.wrong-fb { background: rgba(216,57,73,0.08); border: 1px solid rgba(216,57,73,0.15); color: var(--cc); }
  .next-btn-wrap { margin-top: 32px; text-align: center; }

  /* ── Visual elements ── */
  .stat-cards { display: flex; gap: 16px; margin-bottom: 28px; }
  .stat-card { flex:1; padding: 20px 24px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03); }
  .stat-card .sc-val { font-family: 'Fraunces', serif; font-size: 36px; font-weight: 500; margin-bottom: 4px; }
  .stat-card .sc-label { font-size: 12px; color: var(--gg); line-height: 1.4; }
  .stat-card.red .sc-val { color: var(--pr); }
  .stat-card.teal .sc-val { color: var(--ot-glow); }

  /* Chart */
  .chart-container { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 24px; margin-bottom: 28px; position: relative; }
  .chart-container canvas { width: 100%; height: 260px; }
  .chart-title { font-size: 12px; color: var(--gg); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; font-weight: 600; }
  .chart-annotations { display: flex; gap: 16px; margin-top: 12px; flex-wrap: wrap; }
  .chart-anno { font-size: 11px; display: flex; align-items: center; gap: 6px; }
  .chart-anno .ca-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* Multi-select tiles */
  .tiles-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 16px; }
  .tile-btn { padding: 18px 20px; border: 1.5px solid rgba(255,255,255,0.1); border-radius: 14px; background: rgba(255,255,255,0.03); color: #fff; font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.4; text-align: left; cursor: pointer; transition: all 0.3s ease; user-select: none; }
  .tile-btn:hover { border-color: var(--ot); background: rgba(0,157,128,0.06); }
  .tile-btn:active { transform: scale(0.97); }
  .tile-btn.selected { border-color: var(--ot); background: rgba(0,157,128,0.12); box-shadow: 0 0 20px rgba(0,157,128,0.08); }
  .tile-btn.correct-tile { border-color: var(--ot-glow); background: rgba(0,157,128,0.18); }
  .tile-btn.wrong-tile { border-color: var(--pr); background: rgba(216,57,73,0.12); }
  .tile-btn.missed-tile { border-color: var(--wy); background: rgba(252,170,40,0.08); }
  .tile-check { display: inline-block; width: 20px; height: 20px; border-radius: 6px; border: 1.5px solid rgba(255,255,255,0.2); margin-right: 10px; vertical-align: middle; transition: all 0.3s ease; text-align: center; line-height: 18px; font-size: 12px; }
  .tile-btn.selected .tile-check { border-color: var(--ot); background: var(--ot); color: #fff; }
  .tile-btn.correct-tile .tile-check { border-color: var(--ot-glow); background: var(--ot-glow); }
  .tile-btn.wrong-tile .tile-check { border-color: var(--pr); background: var(--pr); }
  .tiles-hint { font-size: 12px; color: var(--gg); margin-bottom: 16px; font-style: italic; }
  .tiles-submit { display: inline-flex; padding: 14px 36px; border: none; border-radius: 60px; background: var(--ot); color: #fff; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; margin-top: 8px; }
  .tiles-submit:hover { background: var(--ot-glow); }
  .tiles-submit:disabled { opacity: 0.3; pointer-events: none; }

  /* Results */
  .results-center { flex:1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; gap: 20px; padding-bottom: 20px; }
  .score-ring { position: relative; width: 160px; height: 160px; }
  .score-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .score-ring circle { fill: none; stroke-width: 6; cx: 100; cy: 100; r: 90; }
  .score-ring .track { stroke: rgba(255,255,255,0.06); }
  .score-ring .fill { stroke: var(--ot-glow); stroke-linecap: round; stroke-dasharray: 565; stroke-dashoffset: 565; transition: stroke-dashoffset 1.5s ease; }
  .score-ring .score-text { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .score-ring .score-num { font-family: 'Fraunces', serif; font-size: 48px; font-weight: 500; color: #fff; }
  .score-ring .score-of { font-size: 13px; color: var(--gg); margin-top: -4px; }
  .result-title { font-family: 'Fraunces', serif; font-size: 30px; font-weight: 500; color: #fff; line-height: 1.3; }
  .result-desc { font-size: 15px; color: var(--gg); max-width: 480px; line-height: 1.6; }

  /* Email capture */
  .email-capture { width: 100%; max-width: 460px; padding: 28px 32px; border-radius: 20px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); }
  .email-capture h3 { font-family: 'Fraunces', serif; font-size: 19px; font-weight: 500; margin-bottom: 6px; color: #fff; }
  .ec-sub { font-size: 13px; color: var(--gg); margin-bottom: 18px; line-height: 1.5; }
  .ec-field { width: 100%; padding: 15px 18px; border: 1.5px solid rgba(255,255,255,0.12); border-radius: 12px; background: rgba(255,255,255,0.06); color: #fff; font-family: 'DM Sans', sans-serif; font-size: 16px; outline: none; transition: border-color 0.3s ease; margin-bottom: 10px; }
  .ec-field::placeholder { color: rgba(255,255,255,0.3); }
  .ec-field:focus { border-color: var(--ot); }
  .ec-field.error { border-color: var(--pr); }
  .ec-error-msg { font-size: 12px; color: var(--pr); margin-bottom: 8px; display: none; }
  .ec-submit { width: 100%; padding: 16px; border: none; border-radius: 12px; background: var(--ot); color: #fff; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; margin-top: 4px; }
  .ec-submit:hover { background: var(--ot-glow); }
  .ec-submit:active { transform: scale(0.97); }
  .ec-privacy { font-size: 11px; color: rgba(255,255,255,0.25); line-height: 1.5; margin-top: 12px; }
  .ec-success { text-align: center; padding: 24px 20px; animation: fadeUp 0.4s ease; }
  .ec-success .tick { width: 56px; height: 56px; border-radius: 50%; background: rgba(0,157,128,0.15); margin: 0 auto 14px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
  .ec-success h3 { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 500; margin-bottom: 6px; }
  .ec-success p { font-size: 14px; color: var(--gg); line-height: 1.5; }
  .sync-status { font-size: 11px; margin-top: 8px; padding: 6px 12px; border-radius: 8px; display: inline-block; }
  .sync-ok { background: rgba(0,157,128,0.1); color: var(--ot-glow); }
  .sync-fail { background: rgba(216,57,73,0.1); color: var(--cc); }
  .result-actions { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
  .entry-counter { position: fixed; bottom: 14px; right: 18px; z-index: 10; font-size: 11px; color: rgba(255,255,255,0.12); letter-spacing: 1px; }

  /* Admin */
  .admin-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.95); backdrop-filter: blur(12px); padding: 40px; overflow-y: auto; }
  .admin-overlay.active { display: block; animation: fadeUp 0.3s ease; }
  .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
  .admin-header h2 { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 500; }
  .admin-close { padding: 10px 24px; border: 1px solid rgba(255,255,255,0.2); border-radius: 30px; background: transparent; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; }
  .admin-stats { display: flex; gap: 16px; margin-bottom: 28px; }
  .admin-stat { padding: 18px 24px; border-radius: 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); flex:1; text-align: center; }
  .admin-stat .as-num { font-family: 'Fraunces', serif; font-size: 32px; font-weight: 500; color: var(--ot-glow); }
  .admin-stat .as-label { font-size: 12px; color: var(--gg); margin-top: 4px; }
  .admin-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .admin-table th { text-align: left; padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.1); color: var(--ot); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
  .admin-table td { padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.05); color: rgba(255,255,255,0.8); }
  .admin-actions { margin-top: 24px; display: flex; gap: 12px; flex-wrap: wrap; }
  .admin-btn { padding: 12px 28px; border: none; border-radius: 30px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
  .admin-btn.export { background: var(--ot); color: #fff; }
  .admin-btn.export:hover { background: var(--ot-glow); }
  .admin-btn.clear { background: rgba(216,57,73,0.12); color: var(--pr); border: 1px solid rgba(216,57,73,0.25); }
  .admin-btn.retry { background: rgba(252,170,40,0.15); color: var(--wy); border: 1px solid rgba(252,170,40,0.3); }
  .winner-banner { margin-top: 20px; padding: 20px 28px; border-radius: 14px; background: rgba(0,157,128,0.1); border: 1px solid rgba(0,157,128,0.2); text-align: center; animation: fadeUp 0.4s ease; }
  .winner-banner .wb-name { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 500; color: var(--ot-glow); }
  .winner-banner .wb-email { font-size: 14px; color: var(--gg); margin-top: 4px; }
  @media (max-width: 820px) {
    .welcome-hero h1 { font-size: 38px; }
    .q-text { font-size: 24px; }
    .result-title { font-size: 26px; }
    .stat-cards { flex-direction: column; }
    .tiles-grid { grid-template-columns: 1fr; }
    .admin-stats { flex-direction: column; }
  }
  .confetti-piece { position: fixed; width: 10px; height: 10px; z-index: 999; animation: confettiFall 3s ease-in forwards; pointer-events: none; }
  @keyframes confettiFall { 0% { opacity:1; transform: translateY(0) rotate(0deg); } 100% { opacity:0; transform: translateY(100vh) rotate(720deg); } }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="entry-counter" id="entryCounter"></div>

<!-- WELCOME -->
<div id="screen-welcome" class="screen active">
  <div class="logo-bar" id="logoMain"><div class="dot"></div><span>Ninety One</span></div>
  <div class="welcome-hero">
    <h1>Can you spot a <em>Quality</em> company?</h1>
    <p>Test your investment instincts against the Ninety One Quality framework. Four questions. Two minutes. One chance to prove you think like a Quality investor.</p>
    <button class="btn-primary" onclick="startQuiz()">Start the challenge &rarr;</button>
  </div>
</div>

<!-- QUIZ -->
<div id="screen-quiz" class="screen">
  <div class="logo-bar"><div class="dot"></div><span>Ninety One</span></div>
  <div class="quiz-header">
    <span class="step-label" id="stepLabel">1 of 4</span>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
  <div class="question-card" id="questionCard"></div>
</div>

<!-- RESULTS -->
<div id="screen-results" class="screen">
  <div class="logo-bar"><div class="dot"></div><span>Ninety One</span></div>
  <div class="results-center">
    <div class="score-ring">
      <svg viewBox="0 0 200 200"><circle class="track"/><circle class="fill" id="scoreCircle"/></svg>
      <div class="score-text">
        <div class="score-num" id="scoreNum">0</div>
        <div class="score-of">out of 4</div>
      </div>
    </div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-desc" id="resultDesc"></div>
    <div class="email-capture" id="emailCapture"></div>
    <div class="result-actions" id="resultActions" style="display:none">
      <button class="btn-primary" onclick="resetQuiz()">Next player &rarr;</button>
    </div>
  </div>
</div>

<!-- ADMIN -->
<div class="admin-overlay" id="adminPanel">
  <div class="admin-header"><h2>Draw entries</h2><button class="admin-close" onclick="closeAdmin()">Close</button></div>
  <div class="admin-stats" id="adminStats"></div>
  <div id="adminTableWrap"></div>
  <div id="winnerArea"></div>
  <div class="admin-actions">
    <button class="admin-btn export" onclick="exportCSV()">Export CSV</button>
    <button class="admin-btn export" onclick="pickWinner()">Pick random winner</button>
    <button class="admin-btn retry" onclick="retryFailed()">Retry failed syncs</button>
    <button class="admin-btn clear" onclick="clearEntries()">Clear all entries</button>
  </div>
</div>

<script>
/* ── Google Sheets config ── */
var GOOGLE_FORM_ID = "1FAIpQLSc3Dhg-iE01W17MgIrnWPvqeDwJG7rgRELbckFAKvrTvBQkaQ";
var FIELD_NAME     = "entry.1930257339";
var FIELD_EMAIL    = "entry.1169210572";
var FIELD_SCORE    = "entry.1182334272";
var CONFIGURED = GOOGLE_FORM_ID && FIELD_NAME && FIELD_EMAIL && FIELD_SCORE;

function submitToGoogleSheets(name, email, scoreVal) {
  if (!CONFIGURED) return Promise.reject('not configured');
  var url = 'https://docs.google.com/forms/d/e/' + GOOGLE_FORM_ID + '/formResponse';
  var params = new URLSearchParams();
  params.append(FIELD_NAME, name);
  params.append(FIELD_EMAIL, email);
  params.append(FIELD_SCORE, scoreVal + '/4');
  return new Promise(function(resolve, reject) {
    var iframe = document.createElement('iframe');
    iframe.name = 'gform_' + Date.now(); iframe.style.display = 'none';
    document.body.appendChild(iframe);
    var form = document.createElement('form');
    form.method = 'POST'; form.action = url; form.target = iframe.name; form.style.display = 'none';
    params.forEach(function(v,k){ var inp = document.createElement('input'); inp.type='hidden'; inp.name=k; inp.value=v; form.appendChild(inp); });
    document.body.appendChild(form);
    iframe.onload = function(){ setTimeout(function(){ try{document.body.removeChild(iframe);}catch(e){} try{document.body.removeChild(form);}catch(e){} },1000); resolve('ok'); };
    iframe.onerror = function(){ try{document.body.removeChild(iframe);}catch(e){} try{document.body.removeChild(form);}catch(e){} reject('error'); };
    form.submit();
    setTimeout(function(){ resolve('timeout-ok'); }, 8000);
  });
}

var TOTAL_Q = 4;
var currentQ = 0, score = 0, answered = false;

/* ── Booking Holdings price data (monthly, split-adjusted approx) ── */
var bookingData = [
  {d:'Jan 19',p:76},{d:'Apr 19',p:80},{d:'Jul 19',p:82},{d:'Oct 19',p:81},{d:'Jan 20',p:83},
  {d:'Feb 20',p:78},{d:'Mar 20',p:52},{d:'Jun 20',p:68},{d:'Sep 20',p:72},{d:'Dec 20',p:90},
  {d:'Mar 21',p:98},{d:'Jun 21',p:96},{d:'Sep 21',p:100},{d:'Dec 21',p:96},
  {d:'Mar 22',p:94},{d:'Jun 22',p:80},{d:'Sep 22',p:76},{d:'Dec 22',p:82},
  {d:'Mar 23',p:112},{d:'Jun 23',p:116},{d:'Sep 23',p:128},{d:'Dec 23',p:150},
  {d:'Mar 24',p:154},{d:'Jun 24',p:162},{d:'Sep 24',p:170},{d:'Dec 24',p:202},
  {d:'Mar 25',p:210},{d:'Jun 25',p:234},{d:'Sep 25',p:220},{d:'Dec 25',p:210},
  {d:'Jan 26',p:195},{d:'Apr 26',p:182}
];

function renderChart() {
  var container = document.getElementById('chartArea');
  if (!container) return;
  var canvas = document.getElementById('bookingChart');
  var ctx = canvas.getContext('2d');
  var W = canvas.width = canvas.offsetWidth * 2;
  var H = canvas.height = canvas.offsetHeight * 2;
  ctx.scale(1,1);
  var padL=60, padR=30, padT=30, padB=50;
  var cW = W-padL-padR, cH = H-padT-padB;
  var prices = bookingData.map(function(d){return d.p;});
  var minP = 30, maxP = 250;
  var n = bookingData.length;

  function x(i){ return padL + (i/(n-1))*cW; }
  function y(p){ return padT + cH - ((p-minP)/(maxP-minP))*cH; }

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1;
  [50,100,150,200,250].forEach(function(p){
    ctx.beginPath(); ctx.moveTo(padL,y(p)); ctx.lineTo(W-padR,y(p)); ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.25)'; ctx.font='20px DM Sans'; ctx.textAlign='right';
    ctx.fillText('$'+p, padL-10, y(p)+6);
  });

  // X labels
  ctx.textAlign='center'; ctx.font='18px DM Sans'; ctx.fillStyle='rgba(255,255,255,0.25)';
  [0,5,10,15,20,25,n-1].forEach(function(i){
    if(i<n) ctx.fillText(bookingData[i].d, x(i), H-padB+30);
  });

  // Area fill
  ctx.beginPath(); ctx.moveTo(x(0),y(prices[0]));
  for(var i=1;i<n;i++) ctx.lineTo(x(i),y(prices[i]));
  ctx.lineTo(x(n-1),H-padB); ctx.lineTo(x(0),H-padB); ctx.closePath();
  var grad = ctx.createLinearGradient(0,padT,0,H-padB);
  grad.addColorStop(0,'rgba(0,157,128,0.2)'); grad.addColorStop(1,'rgba(0,157,128,0)');
  ctx.fillStyle=grad; ctx.fill();

  // Line
  ctx.beginPath(); ctx.moveTo(x(0),y(prices[0]));
  for(var i=1;i<n;i++) ctx.lineTo(x(i),y(prices[i]));
  ctx.strokeStyle='#00c9a3'; ctx.lineWidth=3; ctx.stroke();

  // Annotations
  function anno(idx,label,col,above){
    var px=x(idx), py=y(prices[idx]);
    ctx.beginPath(); ctx.arc(px,py,6,0,Math.PI*2); ctx.fillStyle=col; ctx.fill();
    ctx.font='bold 18px DM Sans'; ctx.fillStyle=col; ctx.textAlign='center';
    ctx.fillText(label, px, above ? py-16 : py+26);
  }
  anno(4,'$83 peak','rgba(255,255,255,0.6)',true);
  anno(6,'$52 low','#D83949',false);
  anno(n-1,'$182','#00c9a3',true);

  // COVID zone
  ctx.fillStyle='rgba(216,57,73,0.08)';
  ctx.fillRect(x(5),padT,x(8)-x(5),cH);
  ctx.font='16px DM Sans'; ctx.fillStyle='rgba(216,57,73,0.4)'; ctx.textAlign='center';
  ctx.fillText('COVID-19',x(6.5),padT+20);
}

function toggleTile(idx) {
  if(answered) return;
  var sel = window._q4Selected;
  var pos = sel.indexOf(idx);
  if(pos > -1) sel.splice(pos,1); else sel.push(idx);
  window._q4Selected = sel;
  document.querySelectorAll('.tile-btn').forEach(function(btn,i){
    if(sel.indexOf(i)>-1) { btn.classList.add('selected'); btn.querySelector('.tile-check').textContent='\u2713'; }
    else { btn.classList.remove('selected'); btn.querySelector('.tile-check').textContent=''; }
  });
  document.getElementById('tilesSubmit').disabled = sel.length === 0;
  resetIdle();
}

function submitTiles() {
  if(answered) return;
  answered = true;
  var sel = window._q4Selected;
  var shuffled = window._q4Shuffled;
  var allCorrect = true;

  document.querySelectorAll('.tile-btn').forEach(function(btn,i){

    var isCorrect = shuffled[i].correct;

/* ── Entry management ── */
function getEntries(){ try{return JSON.parse(localStorage.getItem('q91_entries')||'[]');}catch(e){return [];} }
function saveEntryLocal(e){ var a=getEntries(); a.push(e); localStorage.setItem('q91_entries',JSON.stringify(a)); updateCounter(); }
function updateEntry(idx,u){ var a=getEntries(); if(a[idx]){for(var k in u) a[idx][k]=u[k]; localStorage.setItem('q91_entries',JSON.stringify(a));} }
function updateCounter(){ var n=getEntries().length; document.getElementById('entryCounter').textContent=n>0?n+(n===1?' entry':' entries'):''; }

function submitEntry() {
  var name=document.getElementById('nameInput').value.trim();
  var email=document.getElementById('emailInput').value.trim();
  var err=document.getElementById('ecError');
  document.querySelectorAll('.ec-field').forEach(function(f){f.classList.remove('error');});
  err.style.display='none';
  if(!name){document.getElementById('nameInput').classList.add('error');err.textContent='Please enter your name';err.style.display='block';return;}
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){document.getElementById('emailInput').classList.add('error');err.textContent='Please enter a valid email address';err.style.display='block';return;}
  if(getEntries().some(function(e){return e.email.toLowerCase()===email.toLowerCase();})){err.textContent="You\u2019re already entered \u2014 good luck!";err.style.display='block';document.getElementById('emailInput').classList.add('error');return;}
  document.getElementById('submitBtn').textContent='Submitting...';document.getElementById('submitBtn').style.pointerEvents='none';
  var idx=getEntries().length;
  saveEntryLocal({name:name,email:email,score:score,timestamp:new Date().toISOString(),time:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}),synced:false});
  submitToGoogleSheets(name,email,score).then(function(){updateEntry(idx,{synced:true});showSuccess(name,true);}).catch(function(){showSuccess(name,false);});
}

function showSuccess(name,synced) {
  var msg=synced?'<div class="sync-status sync-ok">\u2713 Saved to Google Sheets</div>':(!CONFIGURED?'<div class="sync-status sync-fail">Saved locally only</div>':'<div class="sync-status sync-fail">Saved locally \u2014 will retry later</div>');
  document.getElementById('emailCapture').innerHTML='<div class="ec-success"><div class="tick">\u2713</div><h3>You\u2019re in the draw!</h3><p>Good luck, '+esc(name.split(' ')[0])+'. We\u2019ll be in touch if you win our Quality basket.</p>'+msg+'</div>';
  document.getElementById('resultActions').style.display='flex'; resetIdle();
}

var tapCount=0,tapTimer;

function openAdmin(){
  var entries=getEntries();
  var avg=entries.length?(entries.reduce(function(s,e){return s+e.score;},0)/entries.length).toFixed(1):'\u2014';
  var synced=entries.filter(function(e){return e.synced;}).length;
  var failed=entries.length-synced;
  document.getElementById('adminStats').innerHTML=
    '<div class="admin-stat"><div class="as-num">'+entries.length+'</div><div class="as-label">Total entries</div></div>'+
    '<div class="admin-stat"><div class="as-num">'+avg+'</div><div class="as-label">Avg score</div></div>'+
    '<div class="admin-stat"><div class="as-num">'+synced+'</div><div class="as-label">Synced</div></div>'+
    (failed>0?'<div class="admin-stat"><div class="as-num" style="color:var(--wy)">'+failed+'</div><div class="as-label">Pending</div></div>':'');
  if(!entries.length){document.getElementById('adminTableWrap').innerHTML='<div style="text-align:center;padding:40px;color:var(--gg);font-style:italic;">No entries yet</div>';}
  else{document.getElementById('adminTableWrap').innerHTML='<table class="admin-table"><thead><tr><th>#</th><th>Name</th><th>Email</th><th>Score</th><th>Time</th><th>Synced</th></tr></thead><tbody>'+entries.map(function(e,i){return '<tr><td>'+(i+1)+'</td><td>'+esc(e.name)+'</td><td>'+esc(e.email)+'</td><td>'+e.score+'/4</td><td>'+(e.time||'\u2014')+'</td><td>'+(e.synced?'\u2713':'\u2717')+'</td></tr>';}).join('')+'</tbody></table>';}
  document.getElementById('winnerArea').innerHTML='';
  document.getElementById('adminPanel').classList.add('active');
}

function exportCSV(){var e=getEntries();if(!e.length)return;var c='Name,Email,Score,Timestamp,Synced\n';e.forEach(function(r){c+='"'+r.name+'","'+r.email+'",'+r.score+',"'+r.timestamp+'",'+(r.synced?'Yes':'No')+'\n';});var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:'text/csv'}));a.download='quality-challenge-entries.csv';a.click();}
function pickWinner(){var e=getEntries();if(!e.length)return;var w=e[Math.floor(Math.random()*e.length)];document.getElementById('winnerArea').innerHTML='<div class="winner-banner"><div style="font-size:13px;color:var(--gg);margin-bottom:8px;text-transform:uppercase;letter-spacing:2px;">Winner</div><div class="wb-name">'+esc(w.name)+'</div><div class="wb-email">'+esc(w.email)+' \u2014 Score: '+w.score+'/4</div></div>';}
function retryFailed(){if(!CONFIGURED){alert('Google Sheets not configured.');return;}var e=getEntries(),f=[];e.forEach(function(x,i){if(!x.synced)f.push(i);});if(!f.length){alert('All synced!');return;}var c=0;f.forEach(function(idx){var r=e[idx];submitToGoogleSheets(r.name,r.email,r.score).then(function(){updateEntry(idx,{synced:true});c++;if(c===f.length){alert('Retried '+f.length+' entries.');openAdmin();}}).catch(function(){c++;if(c===f.length){alert('Retried. Check Synced column.');openAdmin();}});});}
function clearEntries(){if(confirm('Delete all '+getEntries().length+' local entries? Google Sheet unaffected.')){localStorage.removeItem('q91_entries');updateCounter();openAdmin();}}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function launchConfetti(){var colors=['#009D80','#FBAA96','#FCAA28','#D83949','#591739','#E8E5CE'];for(var i=0;i<50;i++){var el=document.createElement('div');el.className='confetti-piece';el.style.left=Math.random()*100+'vw';el.style.top='-10px';el.style.background=colors[Math.floor(Math.random()*colors.length)];el.style.borderRadius=Math.random()>0.5?'50%':'2px';el.style.width=(6+Math.random()*8)+'px';el.style.height=(6+Math.random()*8)+'px';el.style.animationDelay=(Math.random()*1.5)+'s';el.style.animationDuration=(2+Math.random()*2)+'s';document.body.appendChild(el);setTimeout(function(e){return function(){e.remove();};}(el),5000);}}
updateCounter();resetIdle();
</script>
